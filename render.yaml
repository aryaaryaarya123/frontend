services:
  - type: web
    name: ledger-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ledger-db
          property: connectionString

databases:
  - name: ledger-db
    plan: free
    databaseName: ledger
    user: ledger_user
